name: OrangeHRMdemo Playwright Test
run-name: "OrangeHRMdemo Playwright Test (${{ github.event_name == 'workflow_dispatch' && inputs.test_filter || github.event_name == 'pull_request' && 'PR' || github.event_name == 'schedule' && 'scheduled' || 'push' }})"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Mon/Wed/Fri 07:00 UTC = 2am EST. Fixed UTC offset (not DST-adjusted),
    # so this runs at 3am Eastern during EDT (mid-March to early November).
    - cron: '0 7 * * 1,3,5'
  workflow_dispatch:
    inputs:
      test_filter:
        description: 'Which tests to run (ignored if a custom pattern is set below)'
        type: choice
        options: [smoke, regression, all]
        default: smoke
      grep_pattern:
        description: 'Optional: custom -g pattern (matches test title text). Overrides the dropdown above.'
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SUITE_LABEL: Smoke Tests

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - run: npm run test:smoke
        env:
          BASE_URL: ${{ vars.BASE_URL }}
          ORANGEHRM_USERNAME: ${{ secrets.ORANGEHRM_USERNAME }}
          ORANGEHRM_PASSWORD: ${{ secrets.ORANGEHRM_PASSWORD }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: |
            reports/html-report/
            test-results/
          retention-days: 14

      - name: Write job summary
        if: always()
        run: npm run summary

      - name: Notify Slack
        if: always()
        run: npm run notify:slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  regression:
    needs: smoke
    if: success() && github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SUITE_LABEL: Regression Tests

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      # TODO: remove continue-on-error once real @regression-tagged tests exist.
      # Right now there are none, so this step would otherwise fail CI with "No tests found".
      - run: npm run test:regression
        continue-on-error: true
        env:
          BASE_URL: ${{ vars.BASE_URL }}
          ORANGEHRM_USERNAME: ${{ secrets.ORANGEHRM_USERNAME }}
          ORANGEHRM_PASSWORD: ${{ secrets.ORANGEHRM_PASSWORD }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-regression
          path: |
            reports/html-report/
            test-results/
          retention-days: 14

      - name: Write job summary
        if: always()
        run: npm run summary

      - name: Notify Slack
        if: always()
        run: npm run notify:slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  manual:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SUITE_LABEL: Manual (${{ inputs.grep_pattern != '' && inputs.grep_pattern || inputs.test_filter }})

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      # continue-on-error only for the plain 'regression' dropdown pick (no
      # custom pattern), since no @regression-tagged tests exist yet — remove
      # this condition once real ones are added.
      - name: Run selected tests
        continue-on-error: ${{ inputs.grep_pattern == '' && inputs.test_filter == 'regression' }}
        run: |
          if [ -n "${{ inputs.grep_pattern }}" ]; then
            npx playwright test -g "${{ inputs.grep_pattern }}"
          else
            case "${{ inputs.test_filter }}" in
              smoke) npx playwright test --grep @smoke ;;
              regression) npx playwright test --grep @regression ;;
              all) npx playwright test ;;
            esac
          fi
        env:
          BASE_URL: ${{ vars.BASE_URL }}
          ORANGEHRM_USERNAME: ${{ secrets.ORANGEHRM_USERNAME }}
          ORANGEHRM_PASSWORD: ${{ secrets.ORANGEHRM_PASSWORD }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-manual
          path: |
            reports/html-report/
            test-results/
          retention-days: 14

      - name: Write job summary
        if: always()
        run: npm run summary
